apiVersion: v1
kind: Service
metadata:
  name: student-task-manager-service
spec:
  type: NodePort  # Requirement fulfilled: NodePort type to expose to the host machine
  selector:
    app: student-task-manager  # Targets our deployment
  ports:
    - protocol: TCP
      port: 8080       # Port inside the cluster
      targetPort: 8080 # Port your Spring Boot container listens on
      nodePort: 30080  # Maps to http://localhost:30080 on your actual computer